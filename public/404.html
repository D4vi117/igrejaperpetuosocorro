<!DOCTYPE html>
<html lang="pt-br">
<head>

    <link rel="stylesheet" href="/src/styles/general.css">

            <img src="/src/images/igreja-ilustracao.webp" alt="Ilustração da fachada da igreja">

        <div id="site-footer"></div>
    </div>
