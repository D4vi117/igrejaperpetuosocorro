    <style>
.pagination {
    display: flex;
    justify-content: center;
    gap: 8px;
    flex-wrap: wrap;
    margin-top: 20px;
}

.pagination button {
    width: 40px;
    height: 40px;
    padding: 0;
    border: 1px solid #ccc;
    background: #fffdf9;
    color: #5b0f14;
    cursor: pointer;

    display: flex;
    align-items: center;
    justify-content: center;
}

.pagination button.ativo {
    background: #5b0f14;
    color: #fff;
    font-weight: bold;
}

/* Botões Anterior / Próxima */
.pagination .nav-btn {
    font-weight: bold;
}

    .resultado-item{
        margin-top: 20px;
        background-color: #fff;
        border-radius: 8px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        display: flex;
        margin-bottom: 20px;
    }
    .resultado-item img {
        max-width: 200px;
        border-top-left-radius: 8px;
        border-bottom-left-radius: 8px;
        padding-right: 8px;
    }
    @media (max-width: 768px) {
            .pagination button {
        min-width: 44px;
        max-width: 44px;
        height: 44px;
        font-size: 16px;
    }
        .resultado-item img {
            max-width: 100%;
            border-radius: 8px;
        }
        .resultado-item{
            flex-direction: column;
        }
    }
    .resultado-item a {
        text-decoration: none;
        color: inherit;
        display: flex;
        align-items: center;
        padding: 16px;
    }
    </style>

<body class="site-template media-page">
    <div class="wrapper">
        <div id="site-header"></div>

        <main class="page-content">
            <header class="page-heading">
                <h1>Buscar por notícias</h1>
                <p>Encontre galerias de fotos, homilias, artigos e muito mais.</p>
            </header>
        <form id="formBusca" method="GET" action="buscar.php">
            <input type="text" name="busca" placeholder="Buscar por título, conteúdo ou tags..." />
            <select name="tipo">
                <option value="allMidias">Todos os tipos</option>
                <option value="galeria">Galerias</option>
                <option value="homilia">Homilias</option>
                <option value="artigo">Artigos</option>
                <option value="video">Vídeos</option>
            </select>
            <select name="limite">
                <option value="5"selected>5 por página</option>
                <option value="10" >10 por página</option>
                <option value="20">20 por página</option>
                <option value="50">50 por página</option>
            </select>
            <button type="submit">Buscar</button>
        </form>
            <div id="mainContent" style="border-style: none; overflow: hidden; padding: 30px;">
                <h1 style="text-align: center; margin-bottom: 30px;">Resultados da Busca</h1>
                <ul id="resultadosBusca" class="news-list"></ul>
                <div id="paginacao" class="pagination"></div>
            </div>
        </main>
    </div>

<div id="site-footer"></div>
